version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: stockflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: stockflow
    ports:
      - "3308:3306"
    volumes:
      - stockflow_mysql_data:/var/lib/mysql

volumes:
  stockflow_mysql_data: